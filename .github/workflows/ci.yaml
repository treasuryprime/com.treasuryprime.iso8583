name: CI

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  clojure:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macOS-latest]

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Java 17
        uses: actions/setup-java@v5
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Install Clojure tools
        uses: DeLaGuardo/setup-clojure@13.6.0
        with:
          cli: 1.12.0.1479
          clj-kondo: 2024.11.14

      - name: Cache Maven + gitlibs
        uses: actions/cache@v5
        with:
          path: |
            ~/.m2/repository
            ~/.gitlibs
          key: ${{ runner.os }}-clojure-${{ hashFiles('deps.edn') }}
          restore-keys: |
            ${{ runner.os }}-clojure-

      - name: Print versions
        run: clojure -Sdescribe

      - name: Format check
        run: clojure -M:cljfmt check

      - name: clj-kondo lint
        run: clj-kondo --lint src-clj/ test/

      - name: Run tests
        run: clojure -M:test
